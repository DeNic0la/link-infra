name: Weekly Scale Down Dev
on:
  schedule:
    - cron: '0 22 * * 5' # Friday at 22:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scale-down:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          ref: dev
          set-safe-directory: 'true'
      - name: Activate scaling patch
        run: |
          sed -i 's/^#patches:/patches:/' dev/kustomization.yaml
          sed -i 's/^#  - path: patch-stop-all.yaml/  - path: patch-stop-all.yaml/' dev/kustomization.yaml
          sed -i 's/^#    target:/    target:/' dev/kustomization.yaml
          sed -i 's/^#      kind: Deployment/      kind: Deployment/' dev/kustomization.yaml
      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add stages/dev/kustomization.yaml
            git commit -m "chore: scale down dev environment (weekly schedule)"
            git push
          else
            echo "No changes to commit"
          fi
