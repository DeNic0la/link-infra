apiVersion: apps/v1
kind: Deployment
metadata:
  name: link
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: link-back
  template:
    metadata:
      labels:
        app: link-back
    spec:
      containers:
        - name: link-back
          image: link-back:latest
          ports:
            - containerPort: 8080
              hostPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: database-config
          volumeMounts:
            - mountPath: /deployments/config/application-prod.yaml
              readOnly: true
              name: config-volume
              subPath: application-prod.yaml
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
            limits:
              cpu: 800m
              memory: 2000Mi
      volumes:
        - name: config-volume
          configMap:
            name: application-config
            items:
              - key: application-prod.yaml
                path: application-prod.yaml
                mode: 0644
